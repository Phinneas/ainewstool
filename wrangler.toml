# Cloudflare Workers Configuration for AI Newsletter Ingest
name = "ainewsletter-ingest"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Scheduled triggers (runs on Cloudflare, no computer needed)
[triggers]
crons = [
  "0 7 * * 1-5", # Ingest weekday mornings at 7am UTC
  "0 8 * * 6",   # Generate newsletter Saturday 8am UTC
]

# Queue bindings - producers to SEND messages
[[queues.producers]]
queue = "scrape-queue"
binding = "SCRAPE_QUEUE"

[[queues.producers]]
queue = "evaluate-queue"
binding = "EVALUATE_QUEUE"

[[queues.producers]]
queue = "upload-queue"
binding = "UPLOAD_QUEUE"

[[queues.producers]]
queue = "generate-queue"
binding = "GENERATE_QUEUE"

[[queues.producers]]
queue = "publish-queue"
binding = "PUBLISH_QUEUE"

# Queue bindings - consumers to PROCESS messages
[[queues.consumers]]
queue = "scrape-queue"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "evaluate-queue"
max_batch_size = 20
max_batch_timeout = 30

[[queues.consumers]]
queue = "upload-queue"
max_batch_size = 30
max_batch_timeout = 30

[[queues.consumers]]
queue = "generate-queue"
max_batch_size = 1
max_batch_timeout = 60

[[queues.consumers]]
queue = "publish-queue"
max_batch_size = 1
max_batch_timeout = 30

# R2 bucket for content storage
[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "ainewsletter"

# KV namespace for tracking state and deduplication
[[kv_namespaces]]
binding = "INGEST_STATE"
id = "d858fcdf0fc84221908e17c523f05aa6"

# Secrets (set via wrangler secret put)
# - FIRECRAWL_API_KEY
# - ANTHROPIC_API_KEY
# - MISTRAL_API_KEY
# - MOONSHOT_API_KEY
# - EXA_API_KEY
# - TAVILY_API_KEY
# - PARALLEL_API_KEY
# - PARALLEL_MONITOR_RESEARCH_ID
# - PARALLEL_MONITOR_STARTUP_ID
# - GHOST_ADMIN_API_KEY
# - GHOST_API_URL
# - BEEHIIV_API_KEY
# - BEEHIIV_PUBLICATION_ID
# - IDEOGRAM_API_KEY             (optional)
# - SURREALDB_URL
# - SURREALDB_NS
# - SURREALDB_DB
# - SURREALDB_USER
# - SURREALDB_PASS

# Enable observability
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
