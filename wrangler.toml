# Development environment
[env.dev]
name = "ainewsletter-ingest-dev"

[env.dev.triggers]
crons = []  # Disable scheduled runs in dev

# Dev: Enable observability
[env.dev.observability]
enabled = true
head_sampling_rate = 1

[env.dev.observability.logs]
enabled = true
head_sampling_rate = 1
